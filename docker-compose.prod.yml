# Project Gym - Produção (MySQL + API + Frontend nginx)
# Uso: docker compose -f docker-compose.prod.yml up
# App: http://localhost:8080

services:
  mysql:
    image: mysql:8.0
    container_name: gym_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
      MYSQL_DATABASE: project_gym
      MYSQL_USER: gymuser
      MYSQL_PASSWORD: ${DB_PASSWORD:-gympass1234}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - gym_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root1234}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: inf25dw2g10/gym-api:latest
    container_name: gym_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: gymuser
      DB_PASSWORD: ${DB_PASSWORD:-gympass1234}
      DB_NAME: project_gym
      SESSION_SECRET: ${SESSION_SECRET:-super_secret_key}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-http://localhost:8080/auth/github/callback}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:8080/auth/google/callback}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - gym_network

  frontend:
    image: inf25dw2g10/gym-frontend:latest
    container_name: gym_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - gym_network

volumes:
  mysql_data:

networks:
  gym_network:
    driver: bridge