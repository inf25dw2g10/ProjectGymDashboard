<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 12; }
      .title { font: 700 18px system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .text { font: 14px system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #111827; }
      .muted { font: 12px system-ui, -apple-system, Segoe UI, Roboto, Arial; fill: #374151; }
      .arrow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="40" y="60" width="300" height="170" class="box"/>
  <text x="60" y="95" class="title">Browser / Postman</text>
  <text x="60" y="125" class="text">1) GET /login (browser)</text>
  <text x="60" y="150" class="text">2) OAuth2 (GitHub/Google) ĺ cookie</text>
  <text x="60" y="175" class="text">ou</text>
  <text x="60" y="200" class="text">3) X-API-Key / Authorization: Basic</text>

  <rect x="400" y="40" width="360" height="210" class="box"/>
  <text x="420" y="75" class="title">API (Express)</text>
  <text x="420" y="105" class="text">Middleware: ensureAnyAuth (OR)</text>
  <text x="420" y="130" class="muted">- sessŃo/cookie ĺ req.isAuthenticated()</text>
  <text x="420" y="152" class="muted">- X-API-Key ĺ Utilizador.findOne({ apiKey })</text>
  <text x="420" y="174" class="muted">- Basic ĺ provider=basic + bcrypt.compare</text>
  <text x="420" y="202" class="text">AutorizašŃo/validašŃo: controllers</text>

  <rect x="820" y="70" width="240" height="150" class="box"/>
  <text x="840" y="105" class="title">MySQL</text>
  <text x="840" y="135" class="text">utilizadores</text>
  <text x="840" y="160" class="text">planos_treino</text>
  <text x="840" y="185" class="text">exercicios / metas / ...</text>

  <path d="M340,125 C380,125 380,125 400,125" class="arrow"/>
  <path d="M760,135 C800,135 800,135 820,135" class="arrow"/>

  <rect x="40" y="300" width="1020" height="170" class="box"/>
  <text x="60" y="335" class="title">Notas (como estß no cˇdigo)</text>
  <text x="60" y="365" class="text">- A autorizašŃo nŃo estß sˇ nas rotas: controllers aplicam regras por role e por tipo de plano (pessoal/profissional).</text>
  <text x="60" y="392" class="text">- Ex.: cliente em plano profissional sˇ pode alterar series/reps/pesoKg/notas em exercÝcios.</text>
  <text x="60" y="419" class="text">- Ex.: metas exigem planoId e cliente sˇ cria em plano pessoal; treinador sˇ cria em plano profissional do seu Ômbito.</text>
</svg>
